<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球天气追踪</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #000005;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: white;
        }

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #earth-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 55%;
            height: 100%;
            z-index: 2;
        }

        .content {
            position: fixed;
            top: 0;
            right: 0;
            width: 45%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            text-align: center;
            max-width: 450px;
            width: 85%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateX(0); }
            50% { transform: translateY(-10px) rotateX(1deg); }
        }

        .title {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 700;
            background: linear-gradient(135deg, #8b9dc3, #a8b5c7, #c9cdd4, #e8eaed);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 4s ease infinite;
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .location-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.8rem;
            margin-top: 1rem;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .coords {
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            color: #a8b5c7;
        }

        .coords-row {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
        }

        .coords-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .coords-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .coords-value {
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            color: #a8b5c7;
            margin-top: 0.2rem;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .weather-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }

        .weather-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .weather-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #8fa3b8;
        }

        .weather-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 0.3rem;
            text-transform: uppercase;
        }

        .weather-desc {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 1rem;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }

        .timezone-info {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            text-align: center;
        }

        .timezone-time {
            font-size: 2rem;
            font-weight: 700;
            color: #e8eaed;
            font-family: 'Courier New', monospace;
        }

        .timezone-zone {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #7c8ca2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: orbFloat 10s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: #1a1a3e;
            top: -250px;
            right: -250px;
            opacity: 0.4;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: #0d1b2a;
            bottom: -200px;
            left: -200px;
            animation-delay: -3s;
            opacity: 0.3;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: #151528;
            top: 30%;
            right: 0%;
            left: auto;
            transform: none;
            animation-delay: -6s;
            opacity: 0.25;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(-30px, -20px) scale(1.02); }
        }

        .orb-3 {
            animation-name: orbFloat3;
        }

        @keyframes orbFloat3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(20px, -20px) scale(1.05); }
            50% { transform: translate(-15px, 15px) scale(0.95); }
            75% { transform: translate(-20px, -15px) scale(1.02); }
        }

        .error-msg {
            color: #b8c9db;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <div id="earth-container"></div>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="content">
        <div class="glass" id="main-panel">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div class="loading-text">正在获取您的位置...</div>
            </div>
            <div id="error" style="display:none;" class="error-msg"></div>
            <div id="weather-content" style="display:none;">
                <h1 class="title">全球天气追踪</h1>
                <div class="location-info">
                    <div id="location-name">-</div>
                </div>
                <div class="coords-row">
                    <div class="coords-item">
                        <span class="coords-label">经度</span>
                        <span class="coords-value" id="coords">-</span>
                    </div>
                    <div class="coords-item">
                        <span class="coords-label">纬度</span>
                        <span class="coords-value" id="lat-display">-</span>
                    </div>
                </div>
                <div class="weather-grid">
                    <div class="weather-item">
                        <div class="weather-icon" id="weather-icon">-</div>
                        <div class="weather-value" id="temperature">-</div>
                        <div class="weather-label">温度 (°C)</div>
                    </div>
                    <div class="weather-item">
                        <div class="weather-icon">💨</div>
                        <div class="weather-value" id="wind">-</div>
                        <div class="weather-label">风速 (km/h)</div>
                    </div>
                </div>
                <div class="timezone-info" id="timezone-info">
                    <div class="timezone-time" id="timezone-time">-</div>
                    <div class="timezone-zone" id="timezone-zone">-</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://unpkg.com/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        // 粒子系统
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        const particleCount = 100;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.color = ['#c9cdd4', '#dde0e4', '#e8eaed', '#f5f6f7'][Math.floor(Math.random() * 4)];
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > width) this.speedX *= -1;
                if (this.y < 0 || this.y > height) this.speedY *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function initParticles() {
            resize();
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 150) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(180, 190, 210, ${1 - distance / 150})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        function animateParticles() {
            ctx.fillStyle = 'rgba(0, 0, 5, 0.15)';
            ctx.fillRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', initParticles);

        initParticles();
        animateParticles();

        // Three.js 3D地球
        let scene, camera, renderer, earth, marker, earthGroup;
        let userLat, userLon;

        function initEarth() {
            scene = new THREE.Scene();

            // 宇宙星空背景
            const starCount = 2000;
            const starGeometry = new THREE.BufferGeometry();
            const starPositions = new Float32Array(starCount * 3);
            const starSizes = new Float32Array(starCount);
            const starColors = new Float32Array(starCount * 3);

            for (let i = 0; i < starCount; i++) {
                const i3 = i * 3;
                // 分布在球形空间内
                const radius = 50 + Math.random() * 100;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);

                starPositions[i3] = radius * Math.sin(phi) * Math.cos(theta);
                starPositions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                starPositions[i3 + 2] = radius * Math.cos(phi);

                starSizes[i] = Math.random() * 2 + 0.5;

                // 星星颜色变化 - 白色到淡蓝色/淡黄色
                const colorChoice = Math.random();
                if (colorChoice < 0.7) {
                    starColors[i3] = 0.9 + Math.random() * 0.1;
                    starColors[i3 + 1] = 0.9 + Math.random() * 0.1;
                    starColors[i3 + 2] = 1;
                } else if (colorChoice < 0.85) {
                    starColors[i3] = 1;
                    starColors[i3 + 1] = 0.95 + Math.random() * 0.05;
                    starColors[i3 + 2] = 0.8 + Math.random() * 0.1;
                } else {
                    starColors[i3] = 0.7 + Math.random() * 0.2;
                    starColors[i3 + 1] = 0.8 + Math.random() * 0.2;
                    starColors[i3 + 2] = 1;
                }
            }

            starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            starGeometry.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
            starGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));

            const starMaterial = new THREE.PointsMaterial({
                size: 0.15,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                sizeAttenuation: true
            });

            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);

            // 星云效果 - 大型半透明云团
            for (let i = 0; i < 5; i++) {
                const nebulaGeometry = new THREE.SphereGeometry(15 + Math.random() * 20, 32, 32);
                const nebulaMaterial = new THREE.MeshBasicMaterial({
                    color: new THREE.Color().setHSL(0.6 + Math.random() * 0.2, 0.3, 0.15),
                    transparent: true,
                    opacity: 0.03 + Math.random() * 0.03,
                    side: THREE.DoubleSide,
                    depthWrite: false
                });
                const nebula = new THREE.Mesh(nebulaGeometry, nebulaMaterial);
                nebula.position.set(
                    (Math.random() - 0.5) * 100,
                    (Math.random() - 0.5) * 60,
                    (Math.random() - 0.5) * 80 - 30
                );
                scene.add(nebula);
            }

            // 调整相机宽高比以适应左侧60%区域
            const aspect = (window.innerWidth * 0.55) / window.innerHeight;
            camera = new THREE.PerspectiveCamera(45, aspect, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth * 0.55, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('earth-container').appendChild(renderer.domElement);

            // 增强灯光效果
            const ambientLight = new THREE.AmbientLight(0x3a4a5a, 0.5);
            scene.add(ambientLight);

            // 主光源 - 太阳模拟 (更强的光照突出表面细节)
            const sunLight = new THREE.DirectionalLight(0xfffaf0, 1.5);
            sunLight.position.set(5, 3, 5);
            sunLight.castShadow = true;
            scene.add(sunLight);

            // 补光 - 月亮模拟
            const moonLight = new THREE.DirectionalLight(0x8ab4d4, 0.4);
            moonLight.position.set(-5, -2, -5);
            scene.add(moonLight);

            // 边缘光 - 增加立体感
            const rimLight = new THREE.DirectionalLight(0xc8d4e8, 0.6);
            rimLight.position.set(0, 0, -5);
            scene.add(rimLight);

            // 顶部高光 - 增强3D感
            const topLight = new THREE.DirectionalLight(0xffffff, 0.3);
            topLight.position.set(0, 8, 0);
            scene.add(topLight);

            // 地球 - 增大尺寸增强3D效果
            const textureLoader = new THREE.TextureLoader();
            const earthTexture = textureLoader.load('https://unpkg.com/three-globe@2.24.13/example/img/earth-blue-marble.jpg');
            const bumpTexture = textureLoader.load('https://unpkg.com/three-globe@2.24.13/example/img/earth-topology.png');
            const specTexture = textureLoader.load('https://unpkg.com/three-globe@2.24.13/example/img/earth-water.png');

            const earthGeometry = new THREE.SphereGeometry(1.62, 512, 512);
            const earthMaterial = new THREE.MeshPhongMaterial({
                map: earthTexture,
                bumpMap: bumpTexture,
                bumpScale: 0.18,
                specularMap: specTexture,
                specular: new THREE.Color(0x7a9aca),
                shininess: 35
            });
            // 地球组 - 让所有元素同步旋转
            earthGroup = new THREE.Group();
            scene.add(earthGroup);

            earth = new THREE.Mesh(earthGeometry, earthMaterial);
            earth.castShadow = true;
            earth.receiveShadow = true;
            earthGroup.add(earth);

            // 外层云层 - 增加真实感
            const cloudTexture = textureLoader.load('https://unpkg.com/three-globe@2.24.13/example/img/earth-clouds.png');
            const cloudGeometry = new THREE.SphereGeometry(1.64, 64, 64);
            const cloudMaterial = new THREE.MeshPhongMaterial({
                map: cloudTexture,
                transparent: true,
                opacity: 0.3,
                depthWrite: false
            });
            clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
            clouds.rotation.y = 0.5;
            earthGroup.add(clouds);

            // 大气层光晕 - 分层增强3D感
            const atmosphereGeometry = new THREE.SphereGeometry(1.72, 64, 64);
            const atmosphereMaterial = new THREE.MeshPhongMaterial({
                color: 0x6b8cba,
                transparent: true,
                opacity: 0.15,
                side: THREE.BackSide
            });
            const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
            earthGroup.add(atmosphere);

            // 外层更柔和的光晕
            const outerAtmoGeometry = new THREE.SphereGeometry(1.87, 64, 64);
            const outerAtmoMaterial = new THREE.MeshBasicMaterial({
                color: 0x8fa3b8,
                transparent: true,
                opacity: 0.08,
                side: THREE.BackSide
            });
            const outerAtmosphere = new THREE.Mesh(outerAtmoGeometry, outerAtmoMaterial);
            earthGroup.add(outerAtmosphere);

            // 用户位置标记
            const markerGeometry = new THREE.SphereGeometry(0.09, 32, 32);
            const markerMaterial = new THREE.MeshBasicMaterial({ color: 0xe8eaed });
            marker = new THREE.Mesh(markerGeometry, markerMaterial);

            // 标记脉冲光晕
            const glowGeometry = new THREE.SphereGeometry(0.18, 32, 32);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0xa8b5c7,
                transparent: true,
                opacity: 0.5
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            marker.add(glow);

            // 外部光晕环
            const outerGlowGeometry = new THREE.SphereGeometry(0.27, 32, 32);
            const outerGlowMaterial = new THREE.MeshBasicMaterial({
                color: 0x8fa3b8,
                transparent: true,
                opacity: 0.25
            });
            const outerGlow = new THREE.Mesh(outerGlowGeometry, outerGlowMaterial);
            marker.add(outerGlow);

            earthGroup.add(marker);

            // 添加八大洲四大洋标注
            addContinentsAndOceans();

            // 相机位置调整 - 让地球更居中于左侧
            camera.position.set(0, 0, 6);
            camera.lookAt(0, 0, 0);

            // 添加鼠标控制
            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enableZoom = true;
            controls.minDistance = 4;
            controls.maxDistance = 12;
            controls.enablePan = false;
            controls.rotateSpeed = 0.5;

            // 鼠标交互事件
            controls.addEventListener('start', () => {
                userInteracting = true;
            });
            controls.addEventListener('end', () => {
                userInteracting = false;
                lastInteractionTime = Date.now();
            });

            window.addEventListener('resize', onWindowResize);
            animateEarth(controls);
        }

        function latLonToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            const x = -radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.cos(phi);
            const z = radius * Math.sin(phi) * Math.sin(theta);
            return new THREE.Vector3(x, y, z);
        }

        // 添加八大洲四大洋标注
        function addContinentsAndOceans() {
            // 八大洲坐标
            const continents = [
                { name: '亚洲', lat: 34, lon: 100, color: 0xe8eaed },
                { name: '非洲', lat: 0, lon: 20, color: 0xd4d8dc },
                { name: '北美洲', lat: 45, lon: -100, color: 0xc8cdd2 },
                { name: '南美洲', lat: -15, lon: -60, color: 0xdde1e6 },
                { name: '南极洲', lat: -90, lon: 0, color: 0xf0f2f4 },
                { name: '欧洲', lat: 50, lon: 15, color: 0xe0e4e8 },
                { name: '大洋洲', lat: -25, lon: 140, color: 0xd8dce2 }
            ];

            // 四大洋坐标
            const oceans = [
                { name: '太平洋', lat: 10, lon: -160, color: 0x6b8cba },
                { name: '大西洋', lat: 25, lon: -40, color: 0x5a7a9a },
                { name: '印度洋', lat: -20, lon: 75, color: 0x7a8caa },
                { name: '北冰洋', lat: 85, lon: 0, color: 0x8a9cba }
            ];

            // 创建文字标注
            function createTextSprite(name, color) {
                const canvas = document.createElement('canvas');
                canvas.width = 256;
                canvas.height = 64;
                const ctx = canvas.getContext('2d');

                // 文字
                ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
                ctx.font = 'bold 32px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(name, 128, 32);

                const texture = new THREE.CanvasTexture(canvas);
                texture.needsUpdate = true;
                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
                    map: texture,
                    transparent: true
                }));
                sprite.scale.set(0.8, 0.2, 1);
                return sprite;
            }

            // 添加洲际标注
            continents.forEach(c => {
                const pos = latLonToVector3(c.lat, c.lon, 1.98);
                const dot = new THREE.Mesh(
                    new THREE.SphereGeometry(0.03, 12, 12),
                    new THREE.MeshBasicMaterial({ color: c.color })
                );
                dot.position.copy(pos);
                earthGroup.add(dot);

                const label = createTextSprite(c.name, c.color);
                label.position.copy(pos);
                label.position.multiplyScalar(1.15);
                earthGroup.add(label);
            });

            // 添加海洋标注
            oceans.forEach(o => {
                const pos = latLonToVector3(o.lat, o.lon, 1.98);
                const dot = new THREE.Mesh(
                    new THREE.SphereGeometry(0.03, 12, 12),
                    new THREE.MeshBasicMaterial({ color: o.color })
                );
                dot.position.copy(pos);
                earthGroup.add(dot);

                const label = createTextSprite(o.name, o.color);
                label.position.copy(pos);
                label.position.multiplyScalar(1.15);
                earthGroup.add(label);
            });
        }

        function setMarkerPosition(lat, lon) {
            userLat = lat;
            userLon = lon;
            const position = latLonToVector3(lat, lon, 1.62);
            marker.position.copy(position);

            // 旋转地球使当前位置背对相机
            // 相机位于正Z轴，看向原点(0,0,0)
            // 经度旋转：使指定经度点旋转到-Z方向（背向相机）
            // 公式：rotation.y = -(lon - 90°) * π/180
            if (earthGroup) {
                earthGroup.rotation.y = -(lon - 90) * (Math.PI / 180);
                earthGroup.rotation.x = -lat * (Math.PI / 180) * 0.15; // 纬度倾斜
            }

            // 添加连接线
            const earthCenter = new THREE.Vector3(0, 0, 0);
            const lineGeometry = new THREE.BufferGeometry().setFromPoints([earthCenter, position]);
            const lineMaterial = new THREE.LineBasicMaterial({
                color: 0xa8b5c7,
                transparent: true,
                opacity: 0.4
            });
            const line = new THREE.Line(lineGeometry, lineMaterial);
            scene.add(line);
        }

        function onWindowResize() {
            const aspect = (window.innerWidth * 0.55) / window.innerHeight;
            camera.aspect = aspect;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth * 0.55, window.innerHeight);
        }

        let clouds;
        let userInteracting = false;
        let lastInteractionTime = 0;

        function animateEarth(controls) {
            requestAnimationFrame(() => animateEarth(controls));

            // 更新控制器（阻尼效果）
            if (controls) {
                controls.update();
            }

            // 旋转地球组（用户不交互时）
            if (earthGroup) {
                const timeSinceInteraction = Date.now() - lastInteractionTime;
                // 交互结束后3秒恢复自动旋转
                if (!userInteracting && timeSinceInteraction > 3000) {
                    earthGroup.rotation.y += 0.0000727; // 真实地球自转速度
                }
            }

            // 云层独立旋转（相对于地球组稍快）
            if (clouds) {
                clouds.rotation.y += 0.00009;
            }

            // 标记脉冲动画
            if (marker) {
                const scale = 1 + Math.sin(Date.now() * 0.003) * 0.15;
                marker.scale.setScalar(scale);
            }

            renderer.render(scene, camera);
        }

        // 天气代码映射
        function getWeatherDesc(code) {
            const weatherMap = {
                0: { icon: '☀️', desc: '晴朗' },
                1: { icon: '🌤️', desc: '大部分晴朗' },
                2: { icon: '⛅', desc: '部分多云' },
                3: { icon: '☁️', desc: '阴天' },
                45: { icon: '🌫️', desc: '雾' },
                48: { icon: '🌫️', desc: '霜雾' },
                51: { icon: '🌧️', desc: '小毛毛雨' },
                53: { icon: '🌧️', desc: '中等毛毛雨' },
                55: { icon: '🌧️', desc: '大毛毛雨' },
                61: { icon: '🌧️', desc: '小雨' },
                63: { icon: '🌧️', desc: '中雨' },
                65: { icon: '🌧️', desc: '大雨' },
                71: { icon: '🌨️', desc: '小雪' },
                73: { icon: '🌨️', desc: '中雪' },
                75: { icon: '❄️', desc: '大雪' },
                77: { icon: '🌨️', desc: '雪粒' },
                80: { icon: '🌦️', desc: '阵雨' },
                81: { icon: '🌦️', desc: '中阵雨' },
                82: { icon: '⛈️', desc: '大阵雨' },
                85: { icon: '🌨️', desc: '阵雪' },
                86: { icon: '❄️', desc: '大雪阵雪' },
                95: { icon: '⛈️', desc: '雷暴' },
                96: { icon: '⛈️', desc: '雷暴加冰雹' },
                99: { icon: '⛈️', desc: '强雷暴加冰雹' }
            };
            return weatherMap[code] || { icon: '❓', desc: '未知' };
        }

        // 获取IP位置 - 多API备用
        async function getIPLocation() {
            // 默认位置（北京）
            const defaultLocation = { lat: 39.9042, lon: 116.4074, city: '北京市', country: '中国' };

            // 优先使用浏览器GPS
            if (navigator.geolocation) {
                try {
                    const pos = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true,
                            timeout: 8000,
                            maximumAge: 60000
                        });
                    });
                    return {
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        city: 'GPS定位',
                        country: ''
                    };
                } catch (e) {
                    console.warn('GPS失败');
                }
            }

            // 使用 ip-api.com (HTTPS)
            try {
                const res = await fetch('https://ip-api.com/json/?fields=status,country,city,lat,lon', {
                    method: 'GET'
                });
                const data = await res.json();
                if (data.status === 'success') {
                    return {
                        lat: data.lat,
                        lon: data.lon,
                        city: data.city,
                        country: data.country
                    };
                }
            } catch (e) {
                console.warn('ip-api失败');
            }

            // 使用 ipapi.co
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                if (data.latitude) {
                    return {
                        lat: data.latitude,
                        lon: data.longitude,
                        city: data.city,
                        country: data.country_name
                    };
                }
            } catch (e) {
                console.warn('ipapi失败');
            }

            // 全部失败返回默认
            return defaultLocation;
        }

        // 获取天气
        async function getWeather(lat, lon) {
            // 默认天气数据
            const defaultWeather = {
                temperature: 20,
                windspeed: 10,
                weathercode: 0
            };

            try {
                const response = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`
                );
                if (response.ok) {
                    const data = await response.json();
                    if (data.current_weather) {
                        return data.current_weather;
                    }
                }
            } catch (error) {
                console.warn('天气获取失败，使用默认值');
            }

            return defaultWeather;
        }

        // 更新UI
        function updateUI(location, weather, timezone) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('weather-content').style.display = 'block';

            document.getElementById('location-name').textContent = `${location.city}, ${location.country}`;

            const weatherInfo = getWeatherDesc(weather.weathercode);
            document.getElementById('weather-icon').textContent = weatherInfo.icon;
            document.getElementById('temperature').textContent = weather.temperature;
            document.getElementById('wind').textContent = weather.windspeed;
            document.getElementById('weather-desc').textContent = weatherInfo.desc;

            // 时区和时间
            if (timezone) {
                document.getElementById('timezone-time').textContent = timezone.time;
                document.getElementById('timezone-zone').textContent = timezone.zone;
            }

            // 经纬度显示
            document.getElementById('coords').textContent = location.lon.toFixed(4) + '°';
            document.getElementById('lat-display').textContent = location.lat.toFixed(4) + '°';
        }

        // 获取本地时区和时间
        function getTimezone(lat, lon) {
            // 直接使用浏览器本地时间
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');

            // 根据经度估算时区
            const utcOffset = Math.round(lon / 15);
            const zoneName = getTimezoneName(utcOffset);

            return {
                time: `${hours}:${minutes}:${seconds}`,
                zone: zoneName
            };
        }

        function getTimezoneName(offset) {
            const zones = {
                '-12': 'Etc/GMT+12',
                '-11': 'Pacific/Samoa',
                '-10': 'Pacific/Honolulu',
                '-9': 'America/Anchorage',
                '-8': 'America/Los_Angeles',
                '-7': 'America/Denver',
                '-6': 'America/Chicago',
                '-5': 'America/New_York',
                '-4': 'America/Halifax',
                '-3': 'America/Sao_Paulo',
                '-2': 'Atlantic/Azores',
                '-1': 'Atlantic/Cape_Verde',
                '0': 'UTC',
                '1': 'Europe/Paris',
                '2': 'Europe/Helsinki',
                '3': 'Europe/Moscow',
                '4': 'Asia/Dubai',
                '5': 'Asia/Karachi',
                '6': 'Asia/Dhaka',
                '7': 'Asia/Bangkok',
                '8': 'Asia/Beijing',
                '9': 'Asia/Tokyo',
                '10': 'Australia/Sydney',
                '11': 'Pacific/Noumea',
                '12': 'Pacific/Auckland'
            };
            return zones[offset.toString()] || `UTC${offset >= 0 ? '+' : ''}${offset}`;
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            const errorEl = document.getElementById('error');
            errorEl.style.display = 'block';
            errorEl.textContent = message;
        }

        // 主函数 - 并行优化
        async function init() {
            // 立即初始化地球，不等待位置
            initEarth();

            try {
                // 并行获取位置（天气依赖位置，所以串行）
                const location = await getIPLocation();

                // 立即更新地球位置，并行获取天气和时区
                setMarkerPosition(location.lat, location.lon);

                const weather = await getWeather(location.lat, location.lon);
                const timezone = getTimezone(location.lat, location.lon);
                updateUI(location, weather, timezone);

            } catch (error) {
                showError('获取位置失败，请刷新重试');
            }
        }

        init();
    </script>
