<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>系统日志</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
            background: var(--bg-body);
            color: var(--text-primary);
            overflow: hidden;
            display: block;
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .log-toolbar {
            padding: 8px 12px;
            background: var(--bg-sidebar);
            border-bottom: 0.5px solid var(--separator);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toolbar-title {
            font-family: var(--font-family);
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .log-stats {
            display: flex;
            gap: 12px;
            font-size: 11px;
            color: var(--text-secondary);
            font-family: var(--font-family);
        }

        .stat-count {
            color: var(--text-primary);
            font-weight: 500;
        }

        .toolbar-actions {
            display: flex;
            gap: 6px;
        }

        .log-btn {
            padding: 4px 10px;
            border: 0.5px solid var(--separator);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 11px;
            font-family: var(--font-family);
            cursor: pointer;
            border-radius: var(--radius-s);
            transition: background-color 0.15s, border-color 0.15s;
            -webkit-user-select: none;
            user-select: none;
        }

        .log-btn:hover {
            background: var(--bg-secondary);
            border-color: var(--accent);
        }

        .log-btn:active {
            opacity: 0.7;
        }

        .log-btn-danger {
            color: var(--danger);
        }

        .log-btn-danger:hover {
            border-color: var(--danger);
            background: rgba(255, 59, 48, 0.08);
        }

        /* 表头 */
        .log-header {
            display: grid;
            grid-template-columns: 80px 68px 88px 1fr;
            padding: 5px 8px;
            background: var(--bg-card);
            border-bottom: 0.5px solid var(--separator);
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 11px;
            font-family: var(--font-family);
            position: sticky;
            top: 0;
            z-index: 1;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 日志滚动区域 */
        .log-scroll {
            flex: 1;
            background: var(--bg-body);
            overflow-y: auto;
            font-size: 11.5px;
            line-height: 1.5;
        }

        .log-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .log-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .log-scroll::-webkit-scrollbar-thumb {
            background: var(--separator);
            border-radius: 3px;
        }

        .log-scroll::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }

        /* 日志条目 */
        .log-entry {
            display: grid;
            grid-template-columns: 80px 68px 88px 1fr;
            border-bottom: 0.5px solid var(--separator);
            padding: 3px 8px;
            transition: background-color 0.1s;
        }

        .log-entry:hover {
            background-color: var(--bg-secondary);
        }

        .log-timestamp {
            color: var(--text-tertiary);
            font-size: 10.5px;
        }

        .log-level {
            font-weight: 600;
            font-size: 10.5px;
        }

        .log-context {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 10.5px;
        }

        .log-message {
            color: var(--text-primary);
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 11.5px;
            -webkit-user-select: text;
            user-select: text;
        }

        /* 日志级别颜色 - 使用语义色 */
        .level-INFO .log-level    { color: var(--accent); }
        .level-SUCCESS .log-level { color: var(--success); }
        .level-WARN .log-level    { color: var(--warning); }
        .level-ERROR .log-level   { color: var(--danger); }
        .level-DEBUG .log-level   { color: var(--text-tertiary); }

        /* 消息类型颜色 */
        .context-local   { color: var(--text-secondary); }
        .context-message { color: var(--accent); }

        /* 空状态 */
        .empty-state {
            text-align: center;
            color: var(--text-tertiary);
            padding: 48px 24px;
            font-size: 13px;
            font-family: var(--font-family);
        }
    </style>
</head>

<body>
    <div class="container" role="application" aria-label="系统日志查看器">
        <header class="log-toolbar" role="toolbar" aria-label="日志操作栏">
            <div class="toolbar-left">
                <span class="toolbar-title">系统日志</span>
                <div class="log-stats" aria-live="polite" aria-atomic="true">
                    <span>共 <span class="stat-count" id="totalCount">0</span> 条</span>
                    <span id="logPath" aria-label="日志文件路径">nextype.log</span>
                </div>
            </div>
            <div class="toolbar-actions">
                <button class="log-btn" id="refreshBtn" aria-label="刷新日志">刷新</button>
                <button class="log-btn" id="exportBtn" aria-label="导出日志">导出</button>
                <button class="log-btn log-btn-danger" id="clearBtn" aria-label="清空所有日志">清空</button>
            </div>
        </header>

        <div class="log-header" role="row" aria-label="日志列标题">
            <div role="columnheader">时间</div>
            <div role="columnheader">级别</div>
            <div role="columnheader">消息类型</div>
            <div role="columnheader">内容</div>
        </div>

        <main class="log-scroll" id="logContainer" role="log" aria-live="polite" aria-label="日志列表">
            <div class="empty-state">暂无日志</div>
        </main>
    </div>

    <script>
        const invoke = window.__TAURI__.core.invoke;
        const listen = window.__TAURI__.event.listen;
        var currentLogs = [];

        if (typeof invoke === 'function' && typeof listen === 'function') {
            init();
        } else {
            document.getElementById('logContainer').innerHTML =
                '<div class="empty-state">Tauri API 未就绪</div>';
        }

        async function init() {
            try {
                await loadLogs();
            } catch (e) {
                console.error('[Logs] 初始化失败:', e);
                document.getElementById('logContainer').innerHTML =
                    '<div class="empty-state">加载失败: ' + escapeHtml(e.message || String(e)) + '</div>';
            }

            await listen('new_log_entry', (event) => {
                var logEntry = event.payload;
                currentLogs.push(logEntry);
                if (currentLogs.length > 1000) {
                    currentLogs.shift();
                }
                renderLogs();
            });

            document.getElementById('refreshBtn').addEventListener('click', loadLogs);
            document.getElementById('exportBtn').addEventListener('click', exportLogs);
            document.getElementById('clearBtn').addEventListener('click', clearLogs);
        }

        async function loadLogs() {
            try {
                var logs = await invoke('get_logs');
                currentLogs = logs || [];
                renderLogs();
            } catch (e) {
                console.error('[Logs] 加载日志失败:', e);
                document.getElementById('logContainer').innerHTML =
                    '<div class="empty-state">加载失败: ' + escapeHtml(String(e)) + '</div>';
            }
        }

        function renderLogs() {
            var container = document.getElementById('logContainer');
            document.getElementById('totalCount').textContent = currentLogs.length;

            if (currentLogs.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无日志</div>';
                return;
            }

            var html = currentLogs.map(function(log) {
                var timestamp = formatTimestamp(log.timestamp);
                var parsed = parseMessage(log.message);

                return '<div class="log-entry level-' + escapeHtml(log.level) + '" role="row">' +
                    '<div class="log-timestamp">' + timestamp + '</div>' +
                    '<div class="log-level">' + escapeHtml(log.level) + '</div>' +
                    '<div class="log-context ' + parsed.typeClass + '">' + escapeHtml(parsed.type) + '</div>' +
                    '<div class="log-message">' + escapeHtml(parsed.message) + '</div>' +
                    '</div>';
            }).join('');

            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        function formatTimestamp(timestamp) {
            if (!timestamp) return '-';
            var parts = timestamp.split(' ');
            return parts.length === 2 ? parts[1] : timestamp;
        }

        function parseMessage(fullMessage) {
            if (!fullMessage) return { type: '-', message: '', typeClass: '' };

            var match = fullMessage.match(/^\[(.*?)\] (.*)$/);
            if (match) {
                var type = match[1];
                var message = match[2];
                var typeClass = '';
                if (type === '本地' || type === '本地处理') typeClass = 'context-local';
                else if (type === '消息' || type === '内容同步') typeClass = 'context-message';
                return { type: '[' + type + ']', message: message, typeClass: typeClass };
            }
            return { type: '-', message: fullMessage, typeClass: '' };
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function exportLogs() {
            try {
                var content = currentLogs.map(function(log) {
                    return log.timestamp + ' [' + log.level + '] ' + log.message;
                }).join('\n');

                try {
                    var dialogModule = window.__TAURI_PLUGIN_DIALOG__ ||
                        (window.__TAURI__ ? window.__TAURI__.dialog : null) || {};
                    if (dialogModule.save) {
                        var filePath = await dialogModule.save({
                            defaultPath: 'nextype-logs.txt',
                            filters: [{ name: 'Text', extensions: ['txt'] }]
                        });
                        if (filePath) {
                            await invoke('write_file', { path: filePath, content: content });
                            alert('日志已导出');
                            return;
                        }
                        return;
                    }
                } catch (dialogErr) {
                    console.warn('Dialog API 不可用，使用剪贴板导出:', dialogErr);
                }

                await navigator.clipboard.writeText(content);
                alert('日志已复制到剪贴板');
            } catch (e) {
                console.error('导出日志失败:', e);
                alert('导出失败: ' + (e.message || String(e)));
            }
        }

        async function clearLogs() {
            if (confirm('确定要清空所有日志吗？')) {
                try {
                    await invoke('clear_logs');
                    currentLogs = [];
                    renderLogs();
                } catch (e) {
                    console.error('清空日志失败:', e);
                    alert('清空失败: ' + (e.message || String(e)));
                }
            }
        }
    </script>
</body>

</html>
